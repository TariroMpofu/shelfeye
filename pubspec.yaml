name: shelfeye
description: "ShelfEye — fast iVend retail product lookup."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.1.0
  provider: ^6.1.1
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.10
  connectivity_plus: ^6.0.0
  device_info_plus: ^10.0.0
  uuid: ^4.2.1
  crypto: ^3.0.3
  share_plus: ^10.1.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/brand/appicon/
    - assets/brand/android/
    - assets/brand/splash/
    - assets/brand/svg/
    - assets/brand/inapp/
    - assets/brand/inapp/2.0x/
    - assets/brand/inapp/3.0x/
  # Bundled fonts for offline reliability. google_fonts prefers a bundled family
  # of the same name, so GoogleFonts.schibstedGrotesk()/.ibmPlexMono() keep
  # working without a network fetch.
  fonts:
    - family: Schibsted Grotesk
      fonts:
        - { asset: assets/fonts/SchibstedGrotesk-Regular.ttf, weight: 400 }
        - { asset: assets/fonts/SchibstedGrotesk-Medium.ttf, weight: 500 }
        - { asset: assets/fonts/SchibstedGrotesk-SemiBold.ttf, weight: 600 }
        - { asset: assets/fonts/SchibstedGrotesk-Bold.ttf, weight: 700 }
        - { asset: assets/fonts/SchibstedGrotesk-ExtraBold.ttf, weight: 800 }
    - family: IBM Plex Mono
      fonts:
        - { asset: assets/fonts/IBMPlexMono-Regular.ttf, weight: 400 }
        - { asset: assets/fonts/IBMPlexMono-Medium.ttf, weight: 500 }
        - { asset: assets/fonts/IBMPlexMono-SemiBold.ttf, weight: 600 }
        - { asset: assets/fonts/IBMPlexMono-Bold.ttf, weight: 700 }

# =====================================================================
#  PriceCheck — Launcher icon config (dart run flutter_launcher_icons)
# =====================================================================
flutter_launcher_icons:
  image_path: "assets/brand/appicon/appicon_master_1024.png"
  ios: true
  remove_alpha_ios: true
  android: "ic_launcher"
  min_sdk_android: 21
  adaptive_icon_background: "assets/brand/android/ic_launcher_background.png"
  adaptive_icon_foreground: "assets/brand/android/ic_launcher_foreground.png"

# =====================================================================
#  PriceCheck — Native splash (dart run flutter_native_splash:create)
# =====================================================================
flutter_native_splash:
  color: "#FAF8F3"
  image: "assets/brand/splash/splash_logo_light.png"
  color_dark: "#15211B"
  image_dark: "assets/brand/splash/splash_logo_dark.png"
  android_12:
    color: "#FAF8F3"
    image: "assets/brand/splash/splash_logo_light.png"
    color_dark: "#15211B"
    image_dark: "assets/brand/splash/splash_logo_dark.png"
  fullscreen: true
